name: VibeDeckMac
options:
  bundleIdPrefix: com.vasuyadav.vibedeck
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"

targets:
  VibeDeckMac:
    type: application
    platform: macOS
    sources:
      - path: VibeDeckMac
        excludes:
          - "EmbeddedServer/**"
          - "AppIcon.icon"
          - "AppIcon.icns"
      - path: Shared
    dependencies:
      - target: VibeDeckWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vasuyadav.vibedeck.app
        PRODUCT_NAME: VibeDeckMac
        INFOPLIST_VALUES: |
          LSUIElement = YES
        MARKETING_VERSION: "0.8.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 69J57P723L
        ENABLE_APP_SANDBOX: NO
        COPY_PHASE_STRIP: NO
        STRIP_INSTALLED_PRODUCT: NO
    info:
      path: VibeDeckMac/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: VibeDeck
        CFBundleName: VibeDeckMac
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLName: com.vasuyadav.vibedeck.auth
            CFBundleURLSchemes:
              - vibedeck
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    postBuildScripts:
      - script: |
          SRC_DIR="${SRCROOT}/EmbeddedServer"
          DST_DIR="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/EmbeddedServer"
          if [ -d "$SRC_DIR" ]; then
            rm -rf "$DST_DIR"
            cp -a "$SRC_DIR" "$DST_DIR"
            chmod +x "$DST_DIR/node"
          fi
          exit 0
        name: "Copy EmbeddedServer to app bundle"
    entitlements:
      path: VibeDeckMac/VibeDeckMac.entitlements
      properties:
        com.apple.security.network.client: true

  VibeDeckWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: VibeDeckWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vasuyadav.vibedeck.app.widget
        PRODUCT_NAME: VibeDeckWidget
        MARKETING_VERSION: "0.8.1"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 69J57P723L
        ENABLE_APP_SANDBOX: YES
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
    info:
      path: VibeDeckWidget/Info.plist
      properties:
        CFBundleDisplayName: VibeDeck Widgets
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: VibeDeckWidget/VibeDeckWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
