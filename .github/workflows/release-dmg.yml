name: release DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.5.25)"
        required: true

concurrency:
  group: release-dmg
  cancel-in-progress: false

jobs:
  build:
    # macos-26 ships Xcode 26.x which matches the local dev SDK. Earlier
    # macos-15 (Xcode 16.4) silently rendered widget text using
    # .foregroundStyle(.primary)/(.secondary) as transparent inside
    # `containerBackground(.fill.tertiary, for: .widget)` — every label
    # and hero number disappeared in shipped DMGs even though the same
    # source rendered fine locally. Pinning to macos-26 keeps the SDK in
    # sync with local builds.
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Verify version matches package.json AND VibeDeckMac/project.yml.
      # Skipping the project.yml check once shipped v0.5.77 as a DMG whose
      # Info.plist still advertised 0.5.76 — keep both in lockstep.
      - name: Verify version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PKG_VERSION" != "${{ inputs.version }}" ]]; then
            echo "::error::package.json version ($PKG_VERSION) does not match input (${{ inputs.version }})"
            exit 1
          fi

          # Every MARKETING_VERSION in project.yml (app + widget targets) must
          # equal the requested release version; otherwise the built .app
          # carries a CFBundleShortVersionString that disagrees with the tag.
          PROJECT_YML="VibeDeckMac/project.yml"
          # BSD sed on macOS runners does NOT understand \s — use [[:space:]].
          MISMATCHED=$(grep -E '^[[:space:]]*MARKETING_VERSION:' "$PROJECT_YML" \
            | sed -E 's/.*MARKETING_VERSION:[[:space:]]*"([^"]+)".*/\1/' \
            | sort -u \
            | grep -v "^${{ inputs.version }}$" || true)
          if [ -n "$MISMATCHED" ]; then
            echo "::error::$PROJECT_YML has MARKETING_VERSION value(s) not matching ${{ inputs.version }}: $MISMATCHED"
            exit 1
          fi

      # 1. Build dashboard
      - name: Install dashboard dependencies
        run: npm ci --prefix dashboard

      - name: Build dashboard
        run: npm run dashboard:build

      # 2. Bundle EmbeddedServer (Node.js + VibeDeck source)
      - name: Bundle EmbeddedServer
        run: bash VibeDeckMac/scripts/bundle-node.sh

      # 3. Generate Xcode project
      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: VibeDeckMac
        run: xcodegen generate

      - name: Patch pbxproj for icon
        working-directory: VibeDeckMac
        run: ruby scripts/patch-pbxproj-icon.rb

      # 4. Build app
      - name: Build VibeDeckMac
        working-directory: VibeDeckMac
        run: |
          xcodebuild \
            -scheme VibeDeckMac \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_SWIFT_FLAGS="\$(inherited) -Xfrontend -solver-expression-time-threshold=120" \
            clean build

          # Verify universal binary — fail loudly if Intel slice is missing
          APP_BIN="$(find build/DerivedData/Build/Products/Release -name 'VibeDeck' -path '*/MacOS/*' -maxdepth 5)"
          echo "Built binary: $APP_BIN"
          lipo -info "$APP_BIN"
          if ! lipo -info "$APP_BIN" 2>&1 | grep -q "x86_64"; then
            echo "::error::Binary is NOT universal — missing x86_64 slice. Intel Macs will show a prohibited icon."
            exit 1
          fi
          echo "✓ Universal binary confirmed (arm64 + x86_64)"

      # 4b. Ad-hoc sign — without this, Gatekeeper rejects the downloaded .app
      # as "damaged" because CODE_SIGNING_ALLOWED=NO above produced an entirely
      # unsigned bundle. Ad-hoc signing ("-" identity) makes the error message
      # downgrade to "unidentified developer" which the user can right-click → Open.
      # For a fully trusted install you still need Developer ID + notarization.
      #
      # CRITICAL ORDERING — sign inner-to-outer, NOT with --deep:
      #   1. Inner Mach-O binaries (node, dylibs)
      #   2. The widget extension appex with its OWN entitlements
      #      (must include com.apple.security.app-sandbox or pkd will refuse
      #      to load it with "plug-ins must be sandboxed", and the widget
      #      gallery will silently never list VibeDeck)
      #   3. The outer .app bundle with the host's entitlements, WITHOUT
      #      --deep (otherwise the host entitlements get recursively
      #      re-applied to the appex, stripping its app-sandbox key — the
      #      host is intentionally not sandboxed because it forks Node)
      - name: Ad-hoc sign app
        working-directory: VibeDeckMac
        run: |
          APP_PATH="$(find build/DerivedData/Build/Products/Release -name 'VibeDeck.app' -maxdepth 1)"
          APPEX_PATH="$APP_PATH/Contents/PlugIns/VibeDeckWidget.appex"
          echo "Signing: $APP_PATH"

          # 1. Sign nested Mach-O binaries (inner-to-outer)
          find "$APP_PATH/Contents/Resources/EmbeddedServer" -type f \
            \( -name 'node' -o -name '*.dylib' -o -name '*.so' -o -name '*.node' \) \
            -exec codesign --force --timestamp=none --sign - {} \;

          # 2. Sign the widget extension appex with the WIDGET entitlements
          #    (app-sandbox + app-group). Must happen BEFORE signing the host
          #    so the appex's seal references its own entitlements file.
          if [ -d "$APPEX_PATH" ]; then
            echo "Signing widget extension: $APPEX_PATH"
            codesign --force --timestamp=none \
              --entitlements VibeDeckWidget/VibeDeckWidget.entitlements \
              --sign - "$APPEX_PATH"
          else
            echo "::warning::Widget extension not found at $APPEX_PATH"
          fi

          # 3. Sign the outer .app bundle with the host entitlements.
          #    NO --deep here — that would recursively re-sign the appex
          #    with the host's entitlements (which lack app-sandbox) and
          #    pkd would reject the widget at runtime.
          codesign --force --timestamp=none \
            --entitlements VibeDeckMac/VibeDeckMac.entitlements \
            --sign - "$APP_PATH"

          # Verify
          codesign --verify --verbose=2 "$APP_PATH"
          codesign -dv --verbose=2 "$APP_PATH" 2>&1 | head -8

          # Sanity-check that the widget extension still has app-sandbox
          # after the outer signing pass — this is the exact failure mode
          # that silently breaks widget discovery, so fail loudly here.
          if [ -d "$APPEX_PATH" ]; then
            echo "Verifying widget extension entitlements:"
            codesign -d --entitlements - "$APPEX_PATH" 2>&1 | tee /tmp/appex-ents.txt
            if ! grep -q "com.apple.security.app-sandbox" /tmp/appex-ents.txt; then
              echo "::error::Widget extension is missing com.apple.security.app-sandbox after signing — pkd will refuse to load it and the widget gallery will not list VibeDeck"
              exit 1
            fi
            echo "✓ Widget extension still has app-sandbox entitlement"
          fi

      # 5. Create DMG (uses Homebrew `create-dmg` for headless background + layout)
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        working-directory: VibeDeckMac
        run: |
          APP_PATH="$(find build/DerivedData/Build/Products/Release -name 'VibeDeck.app' -maxdepth 1)"
          echo "App path: $APP_PATH"
          bash scripts/create-dmg.sh "$APP_PATH"

      - name: Package zipped app artifact
        working-directory: VibeDeckMac
        run: |
          APP_PATH="$(find build/DerivedData/Build/Products/Release -name 'VibeDeck.app' -maxdepth 1)"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "build/VibeDeck-${{ inputs.version }}-universal.zip"
          ls -l "build/VibeDeck-${{ inputs.version }}-universal.zip"

      # 6. Create GitHub Release with DMG
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            VibeDeckMac/build/VibeDeck.dmg \
            VibeDeckMac/build/VibeDeck-${{ inputs.version }}-universal.zip \
            --title "v${{ inputs.version }}" \
            --generate-notes
