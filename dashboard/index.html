<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeDeck</title>
    <meta
      name="description"
      content="Local-first cost, usage, and provenance dashboard for AI coding agents."
    />
    <meta property="og:site_name" content="VibeDeck" />
    <meta property="og:title" content="VibeDeck" />
    <meta
      property="og:description"
      content="Local-first cost, usage, and provenance dashboard for AI coding agents."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="VibeDeck" />
    <meta
      name="twitter:description"
      content="Local-first cost, usage, and provenance dashboard for AI coding agents."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="icon" href="/icon-light.svg?v=4" type="image/svg+xml" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/icon.svg?v=4" type="image/svg+xml" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/icon.svg?v=4" type="image/svg+xml" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <script>
      document.documentElement.classList.add("js");
      (function () {
        try {
          if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.nativeBridge) {
            document.documentElement.classList.add("native-app");
          }
        } catch (e) {}
      })();
      (function () {
        var t;
        try {
          t = localStorage.getItem("vibedeck-theme") || localStorage.getItem("vibedeck-theme-legacy");
        } catch (e) {}
        var dark = t === "dark" || (t !== "light" && matchMedia("(prefers-color-scheme:dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
    <style>
      html { background: #fafafa; }
      html.dark { background: #0a0a0a; }
      html.native-app,
      html.native-app.dark,
      html.native-app body {
        background: transparent !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
